name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

jobs:
  migration-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for duplicate migration timestamps
        run: |
          duplicates=$(ls supabase/migrations | grep -E '^[0-9]{14}_.*\.sql$' \
            | sed -E 's/_.*//' | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "::error::Duplicate migration timestamps found:"
            echo "$duplicates" | while read -r ts; do
              echo "  $ts:"
              ls supabase/migrations | grep "^${ts}_"
            done
            exit 1
          fi

      - name: Check for migration timestamp inversion against main
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          main_max=$(git ls-tree -r --name-only origin/main -- supabase/migrations \
            | grep -E '/[0-9]{14}_.*\.sql$' \
            | sed -E 's#.*/([0-9]{14})_.*#\1#' \
            | sort | tail -1)

          if [ -z "$main_max" ]; then
            exit 0
          fi

          new_files=$(comm -13 \
            <(git ls-tree -r --name-only origin/main -- supabase/migrations | sort) \
            <(ls supabase/migrations | sed 's#^#supabase/migrations/#' | sort))

          failed=0
          for f in $new_files; do
            ts=$(basename "$f" | grep -oE '^[0-9]{14}')
            if [ -n "$ts" ] && [ "$ts" \< "$main_max" ]; then
              echo "::error::$f のタイムスタンプ($ts)がmainの最新マイグレーション($main_max)より古いため、supabase db pushが失敗します。npx supabase migration new でタイムスタンプを取り直してください。"
              failed=1
            fi
          done

          exit $failed

  flutter-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Upload golden test failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: '**/failures/**'
          if-no-files-found: ignore

  deno-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase/functions
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check .

      - name: Lint
        run: deno lint .

      - name: Run tests
        run: deno test --allow-net .
